<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stoic — Daily Wisdom</title>
  <meta name="description" content="Learn Stoic philosophy one card at a time. Short quotes, real explanations, and quick comprehension checks.">
  <link href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,600&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>𝕊</text></svg>">
</head>
<body>
  <!-- Mode Selection Screen -->
  <div class="mode-screen" id="modeScreen">
    <div class="mode-screen-inner">
      <div class="mode-logo" aria-label="Stoic Daily Wisdom">
        <svg width="36" height="36" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 10h8M16 10v12M12 22h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="mode-title">Stoic</h1>
      <p class="mode-subtitle">Daily wisdom, made relevant.</p>

      <div class="mode-cards">
        <button class="mode-card mode-card--all" data-mode="all">
          <div class="mode-card-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
          </div>
          <span class="mode-card-label">Everyone</span>
          <span class="mode-card-desc">Universal life scenarios</span>
        </button>

        <button class="mode-card mode-card--teen" data-mode="teen">
          <div class="mode-card-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <span class="mode-card-label">Teens</span>
          <span class="mode-card-desc">School, friends & growing up</span>
        </button>

        <button class="mode-card mode-card--parent" data-mode="parent">
          <div class="mode-card-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <span class="mode-card-label">Parents</span>
          <span class="mode-card-desc">Patience, presence & letting go</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Main App (hidden until mode is chosen) -->
  <div class="app-shell" id="appShell" hidden>
    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <button class="back-btn" id="backBtn" aria-label="Back to mode selection">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="logo" aria-label="Stoic Daily Wisdom">
          <svg width="24" height="24" viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 10h8M16 10v12M12 22h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">Stoic</span>
          <span class="mode-badge" id="modeBadge"></span>
        </div>
        <div class="header-actions">
          <span class="card-counter" id="cardCounter">1 / 10</span>
          <button data-theme-toggle aria-label="Switch to dark mode">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Main card area -->
    <main class="card-viewport" id="cardViewport">
      <div class="card-container" id="cardContainer">
        <!-- Cards rendered by JS -->
      </div>
    </main>

    <!-- Navigation -->
    <nav class="card-nav" id="cardNav">
      <button class="nav-btn" id="prevBtn" aria-label="Previous card" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="nav-dots" id="navDots"></div>
      <button class="nav-btn" id="nextBtn" aria-label="Next card">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </nav>
  </div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
