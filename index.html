<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stoic — Daily Wisdom</title>
  <meta name="description" content="Learn Stoic philosophy one card at a time. Short quotes, real explanations, and quick comprehension checks.">
  <link href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,600&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>𝕊</text></svg>">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo" aria-label="Stoic Daily Wisdom">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 10h8M16 10v12M12 22h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Stoic</span>
      </div>
      <div class="header-actions">
        <span class="card-counter" id="cardCounter">1 / 10</span>
        <button data-theme-toggle aria-label="Switch to dark mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main card area -->
  <main class="card-viewport" id="cardViewport">
    <div class="card-container" id="cardContainer">
      <!-- Cards rendered by JS -->
    </div>
  </main>

  <!-- Navigation -->
  <nav class="card-nav" id="cardNav">
    <button class="nav-btn" id="prevBtn" aria-label="Previous card" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="nav-dots" id="navDots"></div>
    <button class="nav-btn" id="nextBtn" aria-label="Next card">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </nav>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
